services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/market/ws/market
    depends_on:
      - api

  api:
    build:
      context: ./backend
    command:
      - /bin/sh
      - -c
      - alembic upgrade head && python -m app.workers.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  market-data-worker:
    build:
      context: ./backend
    command: python -m app.workers.market_data_worker
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  signal-scanner-worker:
    build:
      context: ./backend
    command: python -m app.workers.signal_scanner_worker
    env_file:
      - ./backend/.env
    depends_on:
      - api
      - redis

  analysis-worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker -Q analysis --loglevel=info
    profiles:
      - workers
    env_file:
      - ./backend/.env
    depends_on:
      - api
      - redis

  alert-worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker -Q alerts --beat --loglevel=info
    profiles:
      - workers
    env_file:
      - ./backend/.env
    depends_on:
      - api
      - redis

  telegram-worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker -Q telegram --loglevel=info
    profiles:
      - workers
    env_file:
      - ./backend/.env
    depends_on:
      - api
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
